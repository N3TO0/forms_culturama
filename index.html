<!doctype html>
<html lang="pt-br">
  <head>
    <meta
      name="description"
      content="Participe da pesquisa cultural da Culturama em menos de 2 minutos."
    />
    <meta name="robots" content="index, follow" />
    <!-- <meta name="robots" content="noindex, nofollow"/> para n aparecer na busca do google -->

    <!-- Open Graph Padrão --> 
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pesquisa Culturama 2026" />
    <meta property="og:description" content="Compartilhe sua opinião." />
    <meta property="og:url" content="https://seusite.com/" />
    <meta
      property="og:image"
      content="https://seusite.com/img/logo-culturama.png"
    />
    <!-- tamanho da imagem: 1200 x 630 pixels -->
    <!-- Para garantir compatibilidade com o Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pesquisa Culturama 2026" />
    <meta name="twitter:description" content="Compartilhe sua opinião." />
    <meta name="twitter:image" content="https://seusite.com/img/logo-culturama.png" />
    
    <link rel="stylesheet" href="css/reset.css">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="/culturama-favico.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans&display=swap"
      rel="stylesheet"
    />
    <title>Culturama</title>
  </head>
  <body>
    <header>
      <img src="/src/img/logo-culturama.png" alt="logo culturama" />
      <h1>Pesquisa Online</h1>
    </header>

    <main>
      <section>
        <form action="/sucesso.html" method="get">
          <fieldset>
            <legend>Dados Pessoais</legend>

            <label for="idName">Nome</label>
            <input id="idName" type="text" name="userName" required />
            <br />
            <label for="idAge">Idade</label>
            <input
              id="idAge"
              type="number"
              min="12"
              max="100"
              name="userAge"
              required
            />
            <br />
            <label for="idBirth">Data de nascimento</label>
            <input id="idBirth" type="date" name="birthDate" />
            <br />
            <label for="idPhone">Numero de telefone</label>
            <input
              id="idPhone"
              type="tel"
              name="userPhone"
              pattern="[0-9]{11}"
              placeholder="00000000000"
              aria-describedby="phoneHelp"
            />
            <small id="phoneHelp">Preencha com 11 dígitos no formato: DDD + números sem espaços ou hífen</small>
            <br />
            <label class="label_email" for="idEmail">E-mail</label>
            <input id="idEmail" type="email" name="userEmail" required />
            <br />
            <label for="idImage">Upload de foto</label>
            <input aria-describedby="imageHelp" id="idImage" type="file" name="userImage" />
            <small id="imageHelp" >Envie uma foto no formato PNG ou JPEG.</small>
          </fieldset>

          <fieldset>
            <legend>Perfil</legend>

            <p>Gênero</p>

            <input
              id="idGander1"
              type="radio"
              name="userGander"
              value="Masculino"
            />
            <label for="idGander1">Masculino</label>

            <input
              id="idGander2"
              type="radio"
              name="userGander"
              value="Feminino"
            />
            <label for="idGander2">Feminino</label>

            <input
              id="idGander3"
              type="radio"
              name="userGander"
              value="notInformed"
            />
            <label for="idGander3">Prefiro não informar</label>

            <br />

            <label for="idMaritalStatus">Estado civil:</label>
            <select id="idMaritalStatus" name="maritalStatus">
              <option value="notInformed">Selecione..</option>
              <option value="solteiro">Solteiro</option>
              <option value="casado">Casado</option>
              <option value="viuvo">Viuvo</option>
              <option value="divorciado">Divorciado</option>
            </select>

            <br />

            <label for="idUserState">Estado</label>
            <select id="idUserState" name="userState" required>
              <option value="notInformed">Selecione..</option>
              <option value="AC">AC</option>
              <option value="AL">AL</option>
              <option value="AP">AP</option>
              <option value="AM">AM</option>
              <option value="BA">BA</option>
              <option value="CE">CE</option>
              <option value="DF">DF</option>
              <option value="ES">ES</option>
              <option value="GO">GO</option>
              <option value="MA">MA</option>
              <option value="MS">MS</option>
              <option value="MT">MT</option>
              <option value="MG">MG</option>
              <option value="PA">PA</option>
              <option value="PB">PB</option>
              <option value="PR">PR</option>
              <option value="PE">PE</option>
              <option value="PI">PI</option>
              <option value="RJ">RJ</option>
              <option value="RN">RN</option>
              <option value="RS">RS</option>
              <option value="RO">RO</option>
              <option value="RR">RR</option>
              <option value="SC">SC</option>
              <option value="SP">SP</option>
              <option value="SE">SE</option>
              <option value="TO">TO</option>
            </select>

            <label for="idUserCity">Cidade</label>
            <input id="idUserCity" type="text" name="userCity" />
          </fieldset>

          <fieldset>
            <legend>Habitos</legend>

            <p>Redes Sociais</p>
            <input
              id="idSocial1"
              type="checkbox"
              name="social"
              value="instagram"
            />
            <label for="idSocial1">Instagram</label>
            <br />
            <input
              id="idSocial2"
              type="checkbox"
              name="social"
              value="facebook"
            />
            <label for="idSocial2">Facebook</label>
            <br />
            <input
              id="idSocial3"
              type="checkbox"
              name="social"
              value="linkedin"
            />
            <label for="idSocial3">Linkedin</label>
            <br />
            <input id="idSocial4" type="checkbox" name="social" value="x" />
            <label for="idSocial4">X</label>
            <br />

            <label for="idMusicaStyle">Estilo musical:</label>
            <input
              list="idstyleTypes"
              id="idMusicaStyle"
              type="text"
              name="userMusicStyle"
            />
            <datalist id="idstyleTypes">
              <option value="Rock"></option>
              <option value="Mpb"></option>
              <option value="Pop"></option>
              <option value="Samba"></option>
              <option value="Sertanejo"></option>
              <option value="K-pop"></option>
            </datalist>
            <br />
            <label for="idFavoriteColor">Cor Favorita</label>
            <input type="color" name="userFavoriteColor" id="idFavoriteColor" />
          </fieldset>

          <fieldset>
            <legend>Opinião</legend>

            <p>Satisfação</p>

            <input
              type="radio"
              name="satisfaction"
              id="idSatisfaction1"
              value="otima"
            />
            <label for="idSatisfaction1">Ótima</label>
            <br />
            <input
              type="radio"
              name="satisfaction"
              id="idSatisfaction2"
              value="boa"
            />
            <label for="idSatisfaction2">Boa</label>
            <br />
            <input
              type="radio"
              name="satisfaction"
              id="idSatisfaction3"
              value="regular"
            />
            <label for="idSatisfaction3">Regular</label>
            <br />
            <input
              type="radio"
              name="satisfaction"
              id="idSatisfaction4"
              value="ruim"
            />
            <label for="idSatisfaction4">Ruin</label>
            <br />
            <label for="idOpinion">Escreva sua opinião:</label>
            <br />
            <textarea name="opinion" id="idOpinion"></textarea>
          </fieldset>

          <fieldset>
            <legend>Confirmações</legend>

            <input
              id="idUserLgpd"
              name="userLgpd"
              type="checkbox"
              value="confirmed"
              required
            />
            <label for="idUserLgpd">Eu aceito particiar da pesquisa</label>
            <br />
            <input
              id="idUserResult"
              name="userResult"
              type="checkbox"
              value="confirmed"
            />
            <label for="idUserResult"
              >Desejo receber o resultado por email</label
            >
          </fieldset>
        <div class="buttons">
          <button aria-label="enviar dados do formulário" type="submit">Enviar</button>
          <button aria-label="limpar dados do formulario" type="reset">Limpar</button>
        </div>
        </form>
      </section>
    </main>

    <footer>
    </footer>
  </body>
</html>
